name: EAS Build (Android Preview)

on:
  workflow_dispatch:   # run manually from the GitHub Actions tab / API

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      # Default checkout uses the ref the workflow was dispatched on, so this
      # builds whichever branch you dispatch (no hardcoded branch).
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Auto-links the EAS project ID. This is the step that made the successful
      # run on main work; earlier runs without it failed at build time.
      - name: Link EAS project
        run: eas init --non-interactive --force
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
