name: Local Android Build (release APK, no EAS)

# Builds an installable Android APK entirely on this GitHub-hosted runner,
# bypassing EAS Build's cloud queue and its monthly free-tier quota. Uses
# `expo prebuild` (an Expo CLI command, NOT EAS) to generate the native
# android/ project, then a plain Gradle build — the same native modules
# (Skia, react-native-notify-kit) and New Architecture setting as the EAS
# build, just compiled locally instead of uploaded to Expo's build servers.
#
# Produces a RELEASE-profile APK, signed with the auto-generated debug
# keystore (fine for installing on your own device to look at a change; not
# for Play Store submission — that still needs EAS's managed release
# keystore). Does not touch eas-build.yml or any EAS config.
#
# Why release, not debug: React Native debug builds do NOT embed the JS
# bundle — they expect a Metro dev server reachable from the phone, and fail
# with "Unable to load script" without one. Release builds always run the
# bundleReleaseJsAndAssets Gradle task, which packages the JS bundle straight
# into the APK, so it works standalone with no dev server. We repoint the
# release signingConfig at the debug keystore (generated by expo prebuild)
# purely so the build produces an installable APK without needing a real
# release keystore/secrets.

on:
  workflow_dispatch:   # run manually from the GitHub Actions tab / API

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate native Android project (expo prebuild)
        run: npx expo prebuild --platform android --no-install

      - name: Sign release build with the debug keystore
        working-directory: android/app
        run: |
          # Expo prebuild generates build.gradle (Groovy). Force the release
          # buildType to use the debug signing config so we get an installable
          # APK without a real release keystore.
          TARGET=build.gradle
          if [ -f build.gradle.kts ]; then TARGET=build.gradle.kts; fi

          # Strategy: replace any existing release signingConfig, or inject one.
          if grep -q 'signingConfig.*release\|signingConfigs.release' "$TARGET"; then
            sed -i 's/signingConfigs.getByName("release")/signingConfigs.getByName("debug")/' "$TARGET"
            sed -i 's/signingConfig signingConfigs.release/signingConfig signingConfigs.debug/' "$TARGET"
          else
            # No release signingConfig found — inject one after "release {"
            sed -i '/release {/a\            signingConfig signingConfigs.debug' "$TARGET"
          fi
          echo "--- Signing config in $TARGET ---"
          grep -n "signingConfig" "$TARGET" || echo "(none found — build may fail)"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Assemble release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon -x mergeReleaseNativeDebugMetadata
        env:
          GRADLE_OPTS: -Xmx4096m -Dorg.gradle.jvmargs=-Xmx4096m

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sourdough-timer-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14
