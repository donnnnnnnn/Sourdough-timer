name: Local Android Build (debug APK, no EAS)

# Builds an installable Android APK entirely on this GitHub-hosted runner,
# bypassing EAS Build's cloud queue and its monthly free-tier quota. Uses
# `expo prebuild` (an Expo CLI command, NOT EAS) to generate the native
# android/ project, then a plain Gradle build — the same native modules
# (Skia, react-native-notify-kit) and New Architecture setting as the EAS
# build, just compiled locally instead of uploaded to Expo's build servers.
#
# Produces a DEBUG-signed APK (fine for installing on your own device to look
# at a change; not for Play Store submission — that still needs EAS's managed
# release keystore). Does not touch eas-build.yml or any EAS config.

on:
  workflow_dispatch:   # run manually from the GitHub Actions tab / API

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate native Android project (expo prebuild)
        run: npx expo prebuild --platform android --no-install

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sourdough-timer-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
