<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fermentation — Seamless Microscope</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0; padding: 16px;
  background: #080604; color: #f0e6d8;
  font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
}
h1 { font-weight: 300; font-size: 22px; margin: 0 0 2px; }
.sub { color: #7a6e66; font-size: 12px; margin: 0 0 12px; }
.panels { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; }
.panel { flex: 1; min-width: 280px; }
.panel-label { font-size: 11px; color: #7a6e66; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
canvas { display: block; width: 100%; border-radius: 6px; background: #030201; }
.scrubber { margin-top: 8px; }
.scrubber input { width: 100%; accent-color: #e8a33d; }
.scrubber-row { display: flex; justify-content: space-between; font-size: 10px; color: #5a5048; margin-top: 2px; }
.stage-label { margin-top: 4px; font-size: 12px; color: #c8a870; text-align: center; min-height: 1.4em; }
.loop-label { margin-top: 8px; font-size: 11px; color: #7a6e66; text-align: center; }
#status { font-size: 10px; color: #4a4440; margin-bottom: 10px; padding: 6px 10px; background: #110e09; border-radius: 4px; }
.ok { color: #5a8f5a; } .warn { color: #c8982a; }
</style>
</head>
<body>
<h1>Sourdough Fermentation</h1>
<p class="sub">Seamless confocal microscope view — each entity is persistent, all motion driven by a single fermentation clock.</p>
<div id="status">Loading sprites…</div>
<div class="panels">
  <div class="panel">
    <div class="panel-label">Interactive — scrub to any stage</div>
    <canvas id="cLeft" width="720" height="480"></canvas>
    <div class="scrubber">
      <input type="range" id="slider" min="0" max="1000" value="0" />
      <div class="scrubber-row">
        <span>Autolyse</span><span>Early ferment</span><span>Peak</span><span>Over-fermented</span>
      </div>
    </div>
    <div class="stage-label" id="stageLbl"></div>
  </div>
  <div class="panel">
    <div class="panel-label">Auto-loop — 2 minutes = full fermentation</div>
    <canvas id="cRight" width="720" height="480"></canvas>
    <div class="loop-label" id="loopLbl">00:00 / 2:00</div>
  </div>
</div>

<script>
// ─── Sprite sheets ───────────────────────────────────────────────────────────
const SHEET_SRCS = {
  org:   'sprites/sheet.png',
  parts: 'sprites/gluten_parts.png',
  poses: 'sprites/sheet2.png',
};

// Fractional slice regions within each sheet.
// sheet.png gaps: H=[0.041,0.417,0.770], V=[0.038,0.384,0.696]
const REGIONS = {
  yeast:     { sheet:'org',   x:0.038, y:0.041, w:0.311, h:0.331 },
  rod2:      { sheet:'org',   x:0.384, y:0.041, w:0.285, h:0.331 },
  rod3:      { sheet:'org',   x:0.696, y:0.041, w:0.304, h:0.331 },
  amylase:   { sheet:'org',   x:0.038, y:0.417, w:0.311, h:0.296 },
  protease:  { sheet:'org',   x:0.384, y:0.417, w:0.285, h:0.296 },
  acetic:    { sheet:'org',   x:0.696, y:0.417, w:0.304, h:0.296 },
  // gluten_parts.png — 3-col 2-row, center-cuts at x=[0.325,0.659], y=[0.467]
  junc_h:    { sheet:'parts', x:0.000, y:0.000, w:0.325, h:0.467 },
  strand:    { sheet:'parts', x:0.325, y:0.000, w:0.334, h:0.467 },
  frayed:    { sheet:'parts', x:0.659, y:0.000, w:0.341, h:0.467 },
  co2:       { sheet:'parts', x:0.000, y:0.467, w:0.325, h:0.533 },
  starch:    { sheet:'parts', x:0.325, y:0.467, w:0.334, h:0.533 },
  junc_s:    { sheet:'parts', x:0.659, y:0.467, w:0.341, h:0.533 },
};

const imgs = {};
let loadedCount = 0;
const totalSheets = Object.keys(SHEET_SRCS).length;

function loadSheets(cb) {
  let done = 0;
  for (const [key, src] of Object.entries(SHEET_SRCS)) {
    const img = new Image();
    img.onload = () => { imgs[key] = img; if (++done === totalSheets) cb(true); };
    img.onerror = () => { if (++done === totalSheets) cb(false); };
    img.src = src;
  }
}

// ─── Seeded random ───────────────────────────────────────────────────────────
let _seed = 0;
function srand(s) { _seed = s >>> 0; }
function rand() {
  _seed = (_seed * 1664525 + 1013904223) & 0xFFFFFFFF;
  return (_seed >>> 0) / 4294967295;
}
function rr(a, b) { return a + rand() * (b - a); }
function ri(a, b) { return Math.floor(a + rand() * (b - a + 1)); }

// ─── Population ──────────────────────────────────────────────────────────────
let population = [];
let junctionList = []; // reference to junction entities for strand lookup

function buildPopulation(CW, CH) {
  srand(0xC0FFEE42);
  const ents = [];

  // Starch granules — present early, consumed by amylase
  for (let i = 0; i < 18; i++) {
    ents.push({ kind:'starch', key:'starch',
      x: rr(0.04, 0.96), y: rr(0.04, 0.96),
      size: rr(0.045, 0.075),
      spawnT: 0, dieT: rr(0.25, 0.60),
      layer: 0 });
  }

  // Gluten junction nodes — form a loose irregular lattice
  const junctions = [];
  const JCOLS = 7, JROWS = 5;
  for (let r = 0; r < JROWS; r++) {
    for (let c = 0; c < JCOLS; c++) {
      const jx = (c + 0.5 + rr(-0.25, 0.25)) / JCOLS;
      const jy = (r + 0.5 + rr(-0.25, 0.25)) / JROWS;
      junctions.push({
        kind: 'junction',
        x: Math.max(0.04, Math.min(0.96, jx)),
        y: Math.max(0.04, Math.min(0.96, jy)),
        spawnT: rr(0.08, 0.20),
        attackT: rr(0.52, 0.78), // when protease damages this node
        idx: junctions.length,
        layer: 1,
      });
    }
  }
  junctionList = junctions;
  ents.push(...junctions);

  // Gluten strands — connect nearby junction pairs
  for (let i = 0; i < junctions.length; i++) {
    for (let j = i + 1; j < junctions.length; j++) {
      const dx = junctions[j].x - junctions[i].x;
      const dy = junctions[j].y - junctions[i].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 0.20 && rand() < 0.65) {
        ents.push({ kind:'strand', j1i: i, j2i: j, layer: 0.5 });
      }
    }
  }

  // Yeast cells
  for (let i = 0; i < 9; i++) {
    ents.push({ kind:'yeast', key:'yeast',
      x: rr(0.08, 0.92), y: rr(0.10, 0.90),
      ang: rr(0, Math.PI * 2), angV: rr(-0.004, 0.004),
      size: rr(0.075, 0.110),
      spawnT: rr(0, 0.12), dieT: rr(0.88, 0.96),
      vx: rr(-0.0005, 0.0005), vy: rr(-0.0005, 0.0005),
      layer: 2 });
  }

  // LAB rods — spawn and multiply through fermentation
  for (let i = 0; i < 22; i++) {
    const chain = i < 8 ? 'rod2' : (i < 16 ? 'rod3' : 'rod2');
    ents.push({ kind:'lab', key: chain,
      x: rr(0.04, 0.96), y: rr(0.04, 0.96),
      ang: rr(0, Math.PI * 2), angV: rr(-0.002, 0.002),
      size: rr(0.065, 0.095),
      spawnT: rr(0.04, 0.30), dieT: rr(0.85, 0.94),
      vx: rr(-0.0006, 0.0006), vy: rr(-0.0006, 0.0006),
      layer: 2 });
  }

  // Amylase — present from early on, diffuse through dough
  for (let i = 0; i < 10; i++) {
    ents.push({ kind:'amylase', key:'amylase',
      x: rr(0.05, 0.95), y: rr(0.05, 0.95),
      ang: rr(0, Math.PI * 2), angV: rr(-0.003, 0.003),
      size: rr(0.048, 0.070),
      spawnT: rr(0.01, 0.08), dieT: 1.0,
      vx: rr(-0.0008, 0.0008), vy: rr(-0.0008, 0.0008),
      layer: 1.5 });
  }

  // Protease — emerge in late fermentation, activate with acidity
  for (let i = 0; i < 7; i++) {
    ents.push({ kind:'protease', key:'protease',
      x: rr(0.08, 0.92), y: rr(0.08, 0.92),
      ang: rr(0, Math.PI * 2), angV: rr(-0.003, 0.003),
      size: rr(0.055, 0.080),
      spawnT: rr(0.40, 0.55), dieT: 1.0,
      vx: rr(-0.0004, 0.0004), vy: rr(-0.0004, 0.0004),
      layer: 2.5 });
  }

  // Acetic acid molecules — byproduct of LAB, accumulate
  for (let i = 0; i < 22; i++) {
    ents.push({ kind:'acetic', key:'acetic',
      x: rr(0.03, 0.97), y: rr(0.03, 0.97),
      ang: rr(0, Math.PI * 2), angV: rr(-0.005, 0.005),
      size: rr(0.030, 0.048),
      spawnT: rr(0.08, 0.28), dieT: rr(0.88, 0.96),
      vx: rr(-0.001, 0.001), vy: rr(-0.001, 0.001),
      layer: 1 });
  }

  // CO2 bubbles — inflated by yeast, pop at over-fermentation
  for (let i = 0; i < 14; i++) {
    ents.push({ kind:'co2', key:'co2',
      x: rr(0.08, 0.92), y: rr(0.08, 0.92),
      spawnT: rr(0.12, 0.45), popT: rr(0.68, 0.85),
      maxSize: rr(0.035, 0.08),
      layer: 3 });
  }

  // Sort by layer so gluten renders under organisms
  ents.sort((a, b) => (a.layer || 0) - (b.layer || 0));
  return ents;
}

// ─── Math helpers ─────────────────────────────────────────────────────────────
function ss(a, b, t) {
  const x = Math.max(0, Math.min(1, (t - a) / (b - a)));
  return x * x * (3 - 2 * x);
}

// ─── Blit helpers ─────────────────────────────────────────────────────────────
function blit(ctx, key, cx, cy, size, ang, alpha) {
  if (alpha <= 0.002) return;
  const r = REGIONS[key]; if (!r) return;
  const img = imgs[r.sheet]; if (!img) return;
  const IW = img.naturalWidth, IH = img.naturalHeight;
  const dw = size * ctx.canvas.width;
  const dh = size * ctx.canvas.height;
  ctx.save();
  ctx.globalAlpha = Math.min(1, alpha);
  ctx.globalCompositeOperation = 'lighter';
  ctx.translate(cx, cy);
  if (ang) ctx.rotate(ang);
  ctx.drawImage(img, r.x * IW, r.y * IH, r.w * IW, r.h * IH, -dw / 2, -dh / 2, dw, dh);
  ctx.restore();
}

function blitStrand(ctx, x1, y1, x2, y2, alpha, useFraged) {
  if (alpha <= 0.002) return;
  const key = useFraged ? 'frayed' : 'strand';
  const r = REGIONS[key]; if (!r) return;
  const img = imgs[r.sheet]; if (!img) return;
  const IW = img.naturalWidth, IH = img.naturalHeight;
  const CW = ctx.canvas.width, CH = ctx.canvas.height;
  const px1 = x1 * CW, py1 = y1 * CH, px2 = x2 * CW, py2 = y2 * CH;
  const dx = px2 - px1, dy = py2 - py1;
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len < 2) return;
  const thick = Math.max(5, len * 0.04);
  const ang = Math.atan2(dy, dx);
  ctx.save();
  ctx.globalAlpha = Math.min(1, alpha);
  ctx.globalCompositeOperation = 'lighter';
  ctx.translate((px1 + px2) / 2, (py1 + py2) / 2);
  ctx.rotate(ang);
  ctx.drawImage(img, r.x * IW, r.y * IH, r.w * IW, r.h * IH, -len / 2, -thick / 2, len, thick);
  ctx.restore();
}

// ─── Stage labels ─────────────────────────────────────────────────────────────
const STAGES = [
  [0.00, 'Autolyse — enzymes hydrating, gluten forming'],
  [0.10, 'Early ferment — yeast and LAB waking up'],
  [0.25, 'Active ferment — CO₂ rising, network strengthening'],
  [0.42, 'Peak — full population, lattice at maximum tension'],
  [0.56, 'Late ferment — protease emerging, acid accumulating'],
  [0.70, 'Declining — protease attacking gluten junctions'],
  [0.85, 'Over-fermented — network collapsing, bubbles rupturing'],
];
function stageLabel(t) {
  let s = STAGES[0][1];
  for (const [threshold, label] of STAGES) { if (t >= threshold) s = label; }
  return s;
}

// ─── Main draw ────────────────────────────────────────────────────────────────
function drawFrame(ctx, t, wallSecs) {
  const CW = ctx.canvas.width, CH = ctx.canvas.height;

  // Background
  ctx.clearRect(0, 0, CW, CH);
  ctx.fillStyle = '#030201';
  ctx.fillRect(0, 0, CW, CH);

  // Acid haze — ramps in after t=0.45, peaks late
  const acid = ss(0.42, 0.80, t);
  if (acid > 0) {
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.fillStyle = `rgba(110,25,5,${acid * 0.18})`;
    ctx.fillRect(0, 0, CW, CH);
    ctx.restore();
  }

  for (const e of population) {
    // Drifting organisms (position advances with wall-clock, wraps at edges)
    if (e.kind === 'yeast' || e.kind === 'lab' || e.kind === 'amylase'
        || e.kind === 'protease' || e.kind === 'acetic' || e.kind === 'starch') {

      if (t < e.spawnT || t > e.dieT) continue;
      const emerge = ss(e.spawnT, e.spawnT + 0.04, t);
      const fade   = 1 - ss(e.dieT - 0.04, e.dieT, t);
      let alpha = emerge * fade;

      // Protease brightens as acidity rises
      if (e.kind === 'protease') alpha *= 0.6 + 0.4 * ss(e.spawnT, e.spawnT + 0.15, t);

      const wx = ((e.x + e.vx * wallSecs) % 1 + 1) % 1;
      const wy = ((e.y + e.vy * wallSecs) % 1 + 1) % 1;
      const ang = e.ang + (e.angV || 0) * wallSecs;

      // Starch dims faster as amylase activity rises
      const starchFade = e.kind === 'starch' ? (1 - ss(e.dieT - 0.12, e.dieT, t)) : 1;
      blit(ctx, e.key, wx * CW, wy * CH, e.size, ang, alpha * starchFade * 0.82);
      continue;
    }

    if (e.kind === 'co2') {
      if (t < e.spawnT || t > e.popT + 0.04) continue;
      const grow    = ss(e.spawnT, Math.min(e.popT, e.spawnT + 0.18), t);
      const pop     = 1 - ss(e.popT - 0.01, e.popT + 0.04, t);
      const size    = e.maxSize * grow;
      // drift slowly upward
      const bubWy = ((e.y - 0.00008 * wallSecs) % 1 + 1) % 1;
      blit(ctx, 'co2', e.x * CW, bubWy * CH, size, 0, grow * pop * 0.75);
      continue;
    }

    if (e.kind === 'strand') {
      const j1 = junctionList[e.j1i], j2 = junctionList[e.j2i];
      if (!j1 || !j2) continue;
      // Strands appear as gluten develops, brighten at peak
      const netStr  = ss(0.06, 0.30, t);   // network forming
      const netPeak = 0.7 + 0.3 * ss(0.25, 0.45, t); // brighter at peak
      const sAlpha  = netStr * netPeak * 0.55;
      if (sAlpha < 0.01) continue;

      // Both junctions attacked → fray the strand
      const latestAttack = Math.max(j1.attackT, j2.attackT);
      const frayPct = ss(latestAttack, latestAttack + 0.10, t);

      if (frayPct < 0.05) {
        blitStrand(ctx, j1.x, j1.y, j2.x, j2.y, sAlpha, false);
      } else if (frayPct > 0.85) {
        blitStrand(ctx, j1.x, j1.y, j2.x, j2.y, sAlpha * 0.25, true);
      } else {
        blitStrand(ctx, j1.x, j1.y, j2.x, j2.y, sAlpha * (1 - frayPct), false);
        blitStrand(ctx, j1.x, j1.y, j2.x, j2.y, sAlpha * frayPct * 0.8, true);
      }
      continue;
    }

    if (e.kind === 'junction') {
      if (t < e.spawnT) continue;
      // Ignite during network formation, peak brightness around t=0.4
      const ignite  = ss(e.spawnT, e.spawnT + 0.12, t);
      const bright  = 0.6 + 0.4 * ss(0.20, 0.45, t);
      // Fade once attacked
      const stress  = ss(e.attackT, e.attackT + 0.10, t);
      const jAlpha  = ignite * bright * (1 - stress * 0.6);
      const jSize   = 0.065 * bright;

      if (stress < 0.5) {
        blit(ctx, 'junc_h', e.x * CW, e.y * CH, jSize, 0, jAlpha * 0.9);
      }
      if (stress > 0.1) {
        blit(ctx, 'junc_s', e.x * CW, e.y * CH, jSize * 0.9, 0, jAlpha * stress * 0.85);
      }
      continue;
    }
  }
}

// ─── Stage label helper ───────────────────────────────────────────────────────
function formatTime(secs) {
  const m = Math.floor(secs / 60), s = Math.floor(secs % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

// ─── Main ─────────────────────────────────────────────────────────────────────
const cLeft  = document.getElementById('cLeft');
const cRight = document.getElementById('cRight');
const ctxL   = cLeft.getContext('2d');
const ctxR   = cRight.getContext('2d');
const slider = document.getElementById('slider');
const stageLbl = document.getElementById('stageLbl');
const loopLbl  = document.getElementById('loopLbl');

const LOOP_SECS = 120; // 2-minute full cycle
let startTime = null;

loadSheets((ok) => {
  const statusEl = document.getElementById('status');
  if (ok && imgs.org && imgs.parts) {
    statusEl.innerHTML = '<span class="ok">✓ Sprites loaded — painted art live</span>';
  } else {
    statusEl.innerHTML = '<span class="warn">⚠ Some sprites missing — check sprites/ folder</span>';
  }

  population = buildPopulation(cLeft.width, cLeft.height);

  function frame(ts) {
    if (!startTime) startTime = ts;
    const wallSecs = (ts - startTime) / 1000;

    // Left: interactive, frozen at slider, organisms still drift live
    const tLeft = parseInt(slider.value) / 1000;
    drawFrame(ctxL, tLeft, wallSecs);
    stageLbl.textContent = stageLabel(tLeft);

    // Right: auto-loop through full cycle every LOOP_SECS
    const loopSecs = wallSecs % LOOP_SECS;
    const tRight   = loopSecs / LOOP_SECS;
    drawFrame(ctxR, tRight, wallSecs);
    loopLbl.textContent = `${formatTime(loopSecs)} / ${formatTime(LOOP_SECS)}`;

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
});
</script>
</body>
</html>
